name: ask-jeles

on:
  push:
    paths:
      - "apps/ask-jeles/**"
      - ".github/workflows/ask-jeles.yml"
  pull_request:
    paths:
      - "apps/ask-jeles/**"
      - ".github/workflows/ask-jeles.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    defaults:
      run:
        working-directory: apps/ask-jeles

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile
        run: |
          python -m compileall -q askjeles
          python -m py_compile safe_integration.py app.py

      - name: CLI help
        run: ask-jeles --help

      - name: Pytest
        run: pytest -q

      - name: Demo import smoke
        if: runner.os != 'Windows'
        run: python -c "from askjeles.crown import _DEMO_PAYLOAD; assert _DEMO_PAYLOAD['total'] >= 1"
