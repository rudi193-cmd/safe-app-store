name: story-timeline

on:
  push:
    paths:
      - "apps/story-timeline/**"
      - "tests/story-timeline/**"
      - ".github/workflows/story-timeline.yml"
  pull_request:
    paths:
      - "apps/story-timeline/**"
      - "tests/story-timeline/**"
      - ".github/workflows/story-timeline.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/story-timeline/requirements.txt
          pip install pytest

      - name: Compile
        run: python -m compileall -q apps/story-timeline

      - name: Pytest
        run: pytest -q tests/story-timeline/
