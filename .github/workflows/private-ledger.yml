name: private-ledger

on:
  push:
    paths:
      - "apps/private-ledger/**"
      - ".github/workflows/private-ledger.yml"
  pull_request:
    paths:
      - "apps/private-ledger/**"
      - ".github/workflows/private-ledger.yml"

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    defaults:
      run:
        working-directory: apps/private-ledger

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile
        run: python -m compileall -q src/private_ledger

      - name: Import smoke
        run: |
          python -c "from private_ledger.schema import init_ledger, SCHEMA; assert 'ledger_accounts' in SCHEMA"
          python -c "from private_ledger.db import LedgerDB"
          python -c "from private_ledger.llm import parse_transaction, stream_insights, DEFAULT_MODEL"
          python -c "from private_ledger.app import LedgerApp, main"
