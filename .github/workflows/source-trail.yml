name: source-trail

on:
  push:
    paths:
      - "apps/source-trail/**"
      - ".github/workflows/source-trail.yml"
  pull_request:
    paths:
      - "apps/source-trail/**"
      - ".github/workflows/source-trail.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        working-directory: apps/source-trail
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Compile
        run: python -m compileall -q apps/source-trail/source_trail

      - name: Import smoke
        run: |
          python -c "import source_trail; import source_trail.app"
          python -c "import sources_db; import personas; import safe_integration"
        working-directory: apps/source-trail
